# =============================================================================
# satusky.staging.toml — Staging environment overrides
# =============================================================================
# Inherits all fields from satusky.toml.  Fields set here override the
# base file.  Deploy with:  1ctl deploy --config staging
# =============================================================================

[app]
  cpu_request = "0.5"
  cpu_limit   = "1.0"
  memory      = "256Mi"
  replicas    = 1
  # staging domain override
  # domain      = "staging-api.mycompany.com"

[volume]
  size  = "1Gi"

[hpa]
  enabled      = false       # Disable autoscaling in staging

[pdb]
  enabled      = false       # No PDB needed for single replica
