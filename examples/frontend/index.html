<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SatuSky Frontend Example</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 2.5rem;
      max-width: 480px;
      width: 90%;
      text-align: center;
    }
    .logo { font-size: 2.5rem; margin-bottom: 1rem; }
    h1 { font-size: 1.6rem; font-weight: 700; color: #f7fafc; margin-bottom: 0.5rem; }
    p { color: #a0aec0; font-size: 0.95rem; margin-bottom: 1.5rem; }
    button {
      background: #3b82f6;
      color: #fff;
      border: none;
      padding: 0.6rem 1.4rem;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #2563eb; }
    #result {
      margin-top: 1.2rem;
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 6px;
      padding: 0.8rem 1rem;
      font-size: 0.85rem;
      color: #68d391;
      text-align: left;
      display: none;
      white-space: pre-wrap;
    }
    .badge {
      display: inline-block;
      background: #1a3a5c;
      color: #63b3ed;
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      margin-bottom: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">☁️</div>
    <span class="badge">SatuSky Cloud</span>
    <h1>Frontend Example</h1>
    <p>A static frontend deployed via <code>1ctl</code>. Click the button to call the backend API.</p>
    <button onclick="callAPI()">Call Backend API</button>
    <div id="result"></div>
  </div>

  <script>
    const BACKEND_URL = window.BACKEND_URL || '';

    async function callAPI() {
      const el = document.getElementById('result');
      el.style.display = 'block';
      el.style.color = '#a0aec0';
      el.textContent = 'Calling backend...';
      try {
        const url = BACKEND_URL ? BACKEND_URL + '/api/message' : '/api/message';
        const res = await fetch(url);
        const data = await res.json();
        el.style.color = '#68d391';
        el.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        el.style.color = '#fc8181';
        el.textContent = 'Error: ' + err.message + '\n\nSet BACKEND_URL in nginx.conf or deploy both apps.';
      }
    }
  </script>
</body>
</html>
