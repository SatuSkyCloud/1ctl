name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Fix Homebrew formula class name
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          # GoReleaser generates "class 1ctl" which is invalid Ruby (can't start with number)
          gh api repos/SatuSkyCloud/homebrew-tap/contents/Formula/1ctl.rb --jq '.sha' > /tmp/sha.txt
          gh api repos/SatuSkyCloud/homebrew-tap/contents/Formula/1ctl.rb --jq '.content' | base64 -d | sed 's/^class 1ctl /class OneCtl /' > /tmp/1ctl.rb
          CONTENT=$(base64 -w 0 /tmp/1ctl.rb)
          SHA=$(cat /tmp/sha.txt)
          gh api -X PUT repos/SatuSkyCloud/homebrew-tap/contents/Formula/1ctl.rb \
            -f message="fix: rename class to OneCtl (valid Ruby)" \
            -f content="$CONTENT" \
            -f sha="$SHA"