name: CI

on:
  push:
    branches: [main, development]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
  pull_request:
    branches:
      - main
      - development
      - feature/**
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Self-hosted runner toggle. Set repo VARS (not secrets — these are
# plain strings):
#   USE_SELF_HOSTED=true                 to opt in
#   SELF_HOSTED_RUNNER_LABEL=<label>     the runner-group label
# Falls back to GitHub-hosted ubuntu-latest when the flag is off or the
# variables are unset.
#
# Tests run on Linux only by default — Go's stdlib handles filepath/env
# portability and the `build` job below cross-compiles all 5 OS/arch
# combinations as a smoke test. To exercise the full mac/windows test
# matrix (e.g. before a release), trigger this workflow via
# workflow_dispatch with run_cross_os=true.

jobs:
  test:
    name: Test
    runs-on: ${{ vars.USE_SELF_HOSTED == 'true' && vars.SELF_HOSTED_RUNNER_LABEL || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: task init

      # `task test` uses `-race`, which needs cgo + gcc. The current
      # self-hosted runner image doesn't bundle gcc, so race detection
      # is disabled in CI. Race detection is still on by default for
      # local dev (`task test`). Use `-covermode=count` since we can't
      # use `-covermode=atomic` without -race.
      - name: Run tests
        run: go test -coverprofile=coverage.txt -covermode=count ./...

  lint:
    name: Lint
    runs-on: ${{ vars.USE_SELF_HOSTED == 'true' && vars.SELF_HOSTED_RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8.0

      - name: Run linters
        run: task lint

  security:
    name: Security Scan
    runs-on: ${{ vars.USE_SELF_HOSTED == 'true' && vars.SELF_HOSTED_RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: ./...

  build:
    name: Build Linux AMD64
    runs-on: ${{ vars.USE_SELF_HOSTED == 'true' && vars.SELF_HOSTED_RUNNER_LABEL || 'ubuntu-latest' }}
    needs: [test, lint, security]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Build
        env:
          GOOS: linux
          GOARCH: amd64
        run: task build

      - name: Test binary
        run: ./bin/1ctl --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 1ctl-linux-amd64
          path: bin/1ctl
          retention-days: 7
