name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches:
      - main
      - development
      - feature/**

# Self-hosted runner toggle. Set repo VARS (not secrets — these are
# plain strings):
#   USE_SELF_HOSTED=true                 to opt in
#   SELF_HOSTED_RUNNER_LABEL=<label>     the runner-group label
# Falls back to GitHub-hosted ubuntu-latest when the flag is off or the
# variables are unset.
#
# Tests run on Linux only by default — Go's stdlib handles filepath/env
# portability and the `build` job below cross-compiles all 5 OS/arch
# combinations as a smoke test. To exercise the full mac/windows test
# matrix (e.g. before a release), trigger this workflow via
# workflow_dispatch with run_cross_os=true.

jobs:
  test:
    name: Test
    runs-on: ${{ vars.USE_SELF_HOSTED == 'true' && vars.SELF_HOSTED_RUNNER_LABEL || 'ubuntu-latest' }}
    # `task test` invokes `go test -race -covermode=atomic`, which requires
    # cgo. Self-hosted runners default to CGO_ENABLED=0; enable it here so
    # the race detector can compile and run.
    env:
      CGO_ENABLED: "1"

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: task init

      - name: Run tests
        run: task test

      - name: Run unit tests
        run: task test:unit

      - name: Generate coverage report
        run: task test:coverage

  lint:
    name: Lint
    runs-on: ${{ vars.USE_SELF_HOSTED == 'true' && vars.SELF_HOSTED_RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8.0

      - name: Run linters
        run: task lint

  security:
    name: Security Scan
    runs-on: ${{ vars.USE_SELF_HOSTED == 'true' && vars.SELF_HOSTED_RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: ./...

  build:
    name: Build
    runs-on: ${{ vars.USE_SELF_HOSTED == 'true' && vars.SELF_HOSTED_RUNNER_LABEL || 'ubuntu-latest' }}
    needs: [test, lint, security]
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
        exclude:
          - os: windows
            arch: arm64
          - os: linux
            arch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: task build

      - name: Test binary
        # Only test binary when it matches the runner (self-hosted/ubuntu = linux/amd64)
        # Cross-compiled binaries cannot be executed on different platforms
        if: matrix.os == 'linux' && matrix.arch == 'amd64'
        run: ./bin/1ctl --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 1ctl-${{ matrix.os }}-${{ matrix.arch }}
          path: bin/1ctl${{ matrix.os == 'windows' && '.exe' || '' }}
          retention-days: 7
