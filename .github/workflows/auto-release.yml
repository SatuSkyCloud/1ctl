name: Auto Release

on:
  push:
    branches:
      - main

# Creates the next release tag from the top RELEASE_NOTES.md entry and runs
# GoReleaser in the same workflow. The existing tag-triggered release workflow
# remains available for manual/emergency releases.

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ vars.USE_SELF_HOSTED == 'true' && vars.SELF_HOSTED_RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          version="$(awk '/^## Version / { print $3; exit }' RELEASE_NOTES.md)"
          tag="v${version#v}"

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Top RELEASE_NOTES.md version must be semver, got: ${version}"
            exit 1
          fi

          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Release tag ${tag} already exists; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        if: steps.release.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.release.outputs.tag }}" -m "Release ${{ steps.release.outputs.tag }}"
          git push origin "${{ steps.release.outputs.tag }}"

      - name: Set up Go
        if: steps.release.outputs.skip != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Run GoReleaser
        if: steps.release.outputs.skip != 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
