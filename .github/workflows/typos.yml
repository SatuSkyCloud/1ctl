name: Check spelling

on:
  push:
    branches: [ main ]
  pull_request:
    branches:
    - main
    - feature/**

jobs:
  run:
    name: Spell Check with Typos
    runs-on: ${{ vars.USE_SELF_HOSTED == 'true' && vars.SELF_HOSTED_RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
    - name: Checkout Actions Repository
      uses: actions/checkout@v4

    - name: Check spelling
      uses: crate-ci/typos@v1.23.2
