name: Check spelling

on:
  push:
    branches: [ main ]
  pull_request:
    branches:
    - main
    - feature/**

jobs:
  run:
    name: Spell Check with Typos
    runs-on: ${{ vars.USE_SELF_HOSTED == 'true' && vars.SELF_HOSTED_RUNNER_LABEL || 'ubuntu-latest' }}
    steps:
    - name: Checkout Actions Repository
      uses: actions/checkout@v4

    # crate-ci/typos@v1.x downloads the binary with wget at action runtime.
    # The self-hosted runner image is minimal and doesn't bundle wget, so
    # install it on demand. No-op on GitHub-hosted runners (already present).
    - name: Ensure wget is available
      run: |
        if ! command -v wget >/dev/null 2>&1; then
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq wget
          else
            echo "wget not found and apt-get not available; aborting" >&2
            exit 1
          fi
        fi

    - name: Check spelling
      uses: crate-ci/typos@v1.23.2
